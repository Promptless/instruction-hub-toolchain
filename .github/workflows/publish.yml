name: Publish Instruction Hub

on:
  workflow_call:
    inputs:
      hub-root:
        description: Path to the Instruction Hub root.
        required: false
        type: string
        default: .
      release-branch:
        description: Branch that receives generated artifacts.
        required: false
        type: string
        default: release/stable
      source-branch:
        description: Branch allowed to publish generated artifacts.
        required: false
        type: string
        default: main

jobs:
  instruction-hub:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: Promptless/instruction-hub-toolchain@v0
        with:
          mode: publish
          hub-root: ${{ inputs.hub-root }}
          release-branch: ${{ inputs.release-branch }}
          source-branch: ${{ inputs.source-branch }}
          github-token: ${{ github.token }}
