name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: bash -n scripts/run.sh
      - run: uv run --project python-core pytest

  local-action:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv run --project python-core promptless-instruction-hub init --hub test-hub
      - uses: ./
        with:
          mode: build
          hub-root: test-hub
