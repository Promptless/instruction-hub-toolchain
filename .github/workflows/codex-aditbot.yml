name: Codex Aditbot

on:
  pull_request:
    types:
      - opened
      - ready_for_review
  workflow_dispatch:
    inputs:
      pull_request_number:
        description: Pull request number to analyze
        required: true
        type: string
      reasoning_effort:
        description: Codex reasoning effort
        required: false
        default: high
        type: choice
        options:
          - none
          - medium
          - high
          - extended
          - thorough
  workflow_call:
    inputs:
      pull_request_number:
        required: true
        type: string
      reasoning_effort:
        required: false
        default: high
        type: string

concurrency:
  group: codex-aditbot/${{ github.event.pull_request.number || github.event.inputs.pull_request_number || inputs.pull_request_number || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  codex-aditbot-review:
    if: >-
      ${{
        github.event_name != 'pull_request' ||
        (github.event.pull_request != null && github.event.pull_request.draft == false)
      }}
    runs-on: ubuntu-latest
    outputs:
      final_message: ${{ steps.run_codex.outputs['final-message'] }}
      pr_number: ${{ steps.pr_context.outputs.number }}
      head_sha: ${{ steps.pr_context.outputs.head_sha }}
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      PR_NUMBER: ${{ github.event.pull_request.number || github.event.inputs.pull_request_number || inputs.pull_request_number }}
      CODEX_REASONING: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.reasoning_effort || github.event_name == 'workflow_call' && inputs.reasoning_effort || 'high' }}
    steps:
      - name: Ensure pull request number is available
        run: |
          if [ -z "${PR_NUMBER}" ]; then
            echo "PR number is required for this workflow."
            exit 1
          fi

      - name: Load pull request context
        id: pr_context
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const prNumber = Number(process.env.PR_NUMBER);
            if (!Number.isFinite(prNumber) || prNumber <= 0) {
              core.setFailed('Valid pull request number is required.');
              return;
            }

            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });

            const { data: comparison } = await github.rest.repos.compareCommitsWithBasehead({
              owner: context.repo.owner,
              repo: context.repo.repo,
              basehead: `${pr.base.sha}...${pr.head.sha}`,
            });

            const mergeBaseSha = comparison.merge_base_commit?.sha ?? '';
            if (!mergeBaseSha) {
              core.setFailed('Unable to determine merge base for this pull request.');
              return;
            }

            core.setOutput('number', pr.number.toString());
            core.setOutput('base_ref', pr.base.ref);
            core.setOutput('base_sha', pr.base.sha);
            core.setOutput('head_sha', pr.head.sha);
            core.setOutput('merge_base_sha', mergeBaseSha);
            core.setOutput('title', pr.title ?? '');
            core.setOutput('body', pr.body ?? '');

            if (pr.draft) {
              core.warning('Aditbot normally skips draft PRs; re-run after marking ready for review.');
            }

      - name: Checkout pull request merge commit
        uses: actions/checkout@v5
        with:
          ref: refs/pull/${{ steps.pr_context.outputs.number }}/merge
          fetch-depth: 0

      - name: Build prompt
        run: |
          if [ -f .github/workflows/adit-reviewer-prompt.md ]; then
            cp .github/workflows/adit-reviewer-prompt.md .aditbot-instructions.md
          else
            git show "origin/main:.github/workflows/adit-reviewer-prompt.md" > .aditbot-instructions.md
          fi

          cat > .aditbot-prompt.md <<'PREAMBLE_EOF'
          Review PR #${{ steps.pr_context.outputs.number }} for ${{ github.repository }}.

          Examine ONLY the changes introduced by this pull request:
            Base commit (merge-base): ${{ steps.pr_context.outputs.merge_base_sha }}
            Head commit: ${{ steps.pr_context.outputs.head_sha }}

          Use `git diff ${{ steps.pr_context.outputs.merge_base_sha }}..${{ steps.pr_context.outputs.head_sha }}` to see the changes.
          Read relevant surrounding code to understand context. Do not review the diff in isolation.

          PR Title: ${{ steps.pr_context.outputs.title }}
          PR Body:
          ----
          ${{ steps.pr_context.outputs.body }}
          ----

          PREAMBLE_EOF

          cat .aditbot-instructions.md >> .aditbot-prompt.md

      - name: Run Codex aditbot review
        id: run_codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ env.OPENAI_API_KEY }}
          sandbox: danger-full-access
          codex-args: '["--config","reasoning.effort=${{ env.CODEX_REASONING }}"]'
          prompt-file: .aditbot-prompt.md
          allow-bots: true
          allow-bot-users: promptless[bot]

      - name: Publish Aditbot summary
        if: steps.run_codex.outputs['final-message'] != ''
        env:
          CODEX_OUTPUT: ${{ steps.run_codex.outputs['final-message'] }}
        run: |
          {
            echo "## Aditbot"
            echo ""
            echo "PR #${{ steps.pr_context.outputs.number }} · Reasoning: \`${{ env.CODEX_REASONING }}\`"
            echo ""
            echo "$CODEX_OUTPUT"
          } >> "$GITHUB_STEP_SUMMARY"

  post-aditbot-feedback:
    runs-on: ubuntu-latest
    needs: codex-aditbot-review
    if: needs.codex-aditbot-review.outputs.final_message != ''
    steps:
      - name: Post Aditbot review with inline comments
        uses: actions/github-script@v7
        env:
          ADITBOT_FINAL_MESSAGE: ${{ needs.codex-aditbot-review.outputs.final_message }}
          PR_NUMBER: ${{ needs.codex-aditbot-review.outputs.pr_number }}
          HEAD_SHA: ${{ needs.codex-aditbot-review.outputs.head_sha }}
        with:
          github-token: ${{ github.token }}
          script: |
            const raw = (process.env.ADITBOT_FINAL_MESSAGE || '').trim();
            if (!raw) {
              core.info('No Aditbot findings to report.');
              return;
            }

            const prNumber = Number(process.env.PR_NUMBER);
            if (!Number.isFinite(prNumber) || prNumber <= 0) {
              core.setFailed('Unable to determine pull request number for comment.');
              return;
            }

            let review = null;
            try {
              let jsonStr = raw;
              const fenceMatch = jsonStr.match(/```(?:json)?\s*\n?([\s\S]*?)\n?\s*```/);
              if (fenceMatch) {
                jsonStr = fenceMatch[1];
              }
              if (!jsonStr.trim().startsWith('{')) {
                const objMatch = jsonStr.match(/(\{[\s\S]*\})\s*$/);
                if (objMatch) {
                  jsonStr = objMatch[1];
                }
              }
              review = JSON.parse(jsonStr);
            } catch (e) {
              core.warning(`Could not parse Aditbot JSON output, falling back to plain comment: ${e.message}`);
            }

            if (!review || typeof review.summary !== 'string') {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: `## Aditbot\n\n${raw}`,
              });
              return;
            }

            const inlineComments = Array.isArray(review.inline_comments) ? review.inline_comments : [];
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
              per_page: 100,
            });

            const validLines = new Set();
            for (const file of files) {
              if (!file.patch) continue;
              let currentLine = 0;
              for (const diffLine of file.patch.split('\n')) {
                const hunkMatch = diffLine.match(/^@@ -\d+(?:,\d+)? \+(\d+)(?:,\d+)? @@/);
                if (hunkMatch) {
                  currentLine = parseInt(hunkMatch[1], 10);
                  continue;
                }
                if (diffLine.startsWith('-')) continue;
                if (diffLine.startsWith('+') || diffLine.startsWith(' ')) {
                  validLines.add(`${file.filename}:${currentLine}`);
                  currentLine++;
                }
              }
            }

            const comments = [];
            const droppedComments = [];
            for (const comment of inlineComments) {
              if (!comment.path || !comment.line || !comment.body) {
                droppedComments.push({
                  path: comment.path || '(missing path)',
                  line: comment.line || '(missing line)',
                  body: comment.body || '(missing body)',
                  reason: 'missing required inline comment fields',
                });
                continue;
              }

              const key = `${comment.path}:${comment.line}`;
              if (validLines.has(key)) {
                comments.push({
                  path: comment.path,
                  line: comment.line,
                  side: 'RIGHT',
                  body: comment.body,
                });
              } else {
                droppedComments.push({
                  path: comment.path,
                  line: comment.line,
                  body: comment.body,
                  reason: 'line is not present in the commentable PR diff',
                });
              }
            }

            if (droppedComments.length > 0) {
              core.warning(`Preserving ${droppedComments.length} Aditbot finding(s) in the top-level comment because GitHub could not accept them inline.`);
            }

            const bodyParts = [`## Aditbot\n\n${review.summary}`];
            if (comments.length > 0) {
              bodyParts.push(`_${comments.length} inline comment(s) below._`);
            }
            if (droppedComments.length > 0) {
              const droppedBody = droppedComments.map((comment) => {
                return `**${comment.path}:${comment.line}** (${comment.reason})\n\n${comment.body}`;
              }).join('\n\n');
              bodyParts.push(`_${droppedComments.length} generated inline comment(s) could not be posted inline; preserving them here._\n\n${droppedBody}`);
            }

            const commitId = process.env.HEAD_SHA;
            if (comments.length > 0) {
              await github.rest.pulls.createReview({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                commit_id: commitId,
                event: 'COMMENT',
                body: bodyParts.join('\n\n'),
                comments: comments,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: bodyParts.join('\n\n'),
              });
            }
